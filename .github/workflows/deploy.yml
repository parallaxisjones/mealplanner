name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build # root base path (no BASE_PATH) — served at the domain root
      - uses: cloudflare/wrangler-action@v3
        with:
          # Add CLOUDFLARE_API_TOKEN as a repo secret (Workers Scripts:Edit,
          # Account Settings:Read, and Zone DNS:Edit for the custom domain).
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
